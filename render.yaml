services:
  # =========================
  # BACKEND SERVICE
  # =========================
  - type: web
    name: sabhasaar-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn api:app --host 0.0.0.0 --port $PORT

    envVars:
      - key: PYTHON_VERSION
        value: 3.11

      - key: APP_NAME
        value: SabhaSaar Demo Pipeline V2

      - key: DB_HOST
        sync: false
      - key: DB_PORT
        value: 5432
      - key: DB_NAME
        sync: false
      - key: DB_USER
        sync: false
      - key: DB_PASSWORD
        sync: false

      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false

      - key: RAW_EVENTS_PATH
        value: data/raw_events.csv
      - key: GEO_MASTER_PATH
        value: data/geo_master.csv
      - key: GEO_ALIASES_PATH
        value: data/geo_aliases.csv
      - key: PROCESSED_OUTPUT_PATH
        value: output/processed_events.csv

      - key: NEWS_API_KEY
        sync: false

      - key: RAG_API_URL
        fromService:
          type: web
          name: sabhasaar-rag
          property: hostport


  # =========================
  # RAG SUPABASE SERVICE
  # =========================
  - type: web
    name: sabhasaar-rag
    runtime: python
    rootDir: RAG_SUPABASE
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn api:app --host 0.0.0.0 --port $PORT

    envVars:
      - key: PYTHON_VERSION
        value: 3.11

      - key: PINECONE_API_KEY
        sync: false
      - key: OPENROUTER_API_KEY
        sync: false

      - key: INDEX_NAME
        value: events-rag
      - key: LLM_MODEL
        value: anthropic/claude-3-haiku
      - key: EMBED_MODEL
        value: all-MiniLM-L6-v2

      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false


  # =========================
  # FRONTEND SERVICE
  # =========================
  - type: static
    name: sabhasaar-frontend
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist

    envVars:
      - key: VITE_SUPABASE_URL
        sync: false
      - key: VITE_SUPABASE_ANON_KEY
        sync: false
      - key: VITE_NEWS_API_KEY
        sync: false

      - key: VITE_API_URL
        value: https://sabhasaar-backend.onrender.com
      - key: VITE_RAG_URL
        value: https://sabhasaar-rag.onrender.com

    routes:
      - type: rewrite
        source: /*
        destination: /index.html